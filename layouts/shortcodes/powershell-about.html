<div class="ps-about" data-powershell-about>
  <div class="ps-terminal-wrapper" data-terminal-wrapper>
    <div class="ps-terminal-chrome" aria-hidden="true">
      <span class="ps-terminal-dot"></span>
      <span class="ps-terminal-dot"></span>
      <span class="ps-terminal-dot"></span>
      <span class="ps-terminal-title">Windows PowerShell</span>
    </div>

    <pre class="ps-terminal"><span class="ps-command">PS C:\Users\Justin&gt; .\about-me.ps1</span>
<span class="ps-output" data-ps-output></span><span class="ps-cursor" data-ps-cursor>█</span></pre>
  </div>

  <textarea class="ps-typing-source" data-ps-source aria-hidden="true">{{ .Inner | htmlUnescape }}</textarea>

  <div class="ps-rendered-content about-hidden" data-about-content>
    {{ .Inner | safeHTML }}
  </div>
</div>

<link rel="stylesheet" href="/css/powershell-about.css">
<script src="/js/powershell-about.js" defer></script>
