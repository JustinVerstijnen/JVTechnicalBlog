name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js (for PostCSS)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies (PostCSS, etc.)
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.0"
          extended: true

      - name: Generate planned posts page
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import re

          today = datetime.now(timezone.utc).date()
          planned_posts = []

          for path in sorted(Path("content/en/blog").rglob("*.md")):
              if path.name == "_index.md":
                  continue

              text = path.read_text(encoding="utf-8", errors="ignore")

              date_match = re.search(r"^date:\s*['\"]?([^'\"\n]+)['\"]?", text, re.MULTILINE)
              title_match = re.search(r"^title:\s*['\"]?([^'\"\n]+)['\"]?", text, re.MULTILINE)

              if not date_match:
                  continue

              raw_date = date_match.group(1).strip()

              try:
                  post_date = datetime.fromisoformat(raw_date[:10]).date()
              except ValueError:
                  continue

              if post_date > today:
                  title = title_match.group(1).strip() if title_match else path.stem
                  planned_posts.append({
                      "date": post_date,
                      "title": title,
                      "file": str(path)
                  })

          planned_posts.sort(key=lambda post: post["date"])

          output = Path("content/en/planned-posts.md")

          lines = [
              "---",
              'title: "Planned posts"',
              'description: "Overview of planned future posts."',
              "---",
              "",
              "# Planned posts",
              "",
          ]

          if planned_posts:
              lines.extend([
                  "| Date | Title | File |",
                  "|---|---|---|",
              ])

              for post in planned_posts:
                  lines.append(
                      f"| {post['date'].strftime('%d-%m-%Y')} | {post['title']} | `{post['file']}` |"
                  )
          else:
              lines.append("No planned posts found.")

          lines.append("")

          output.write_text("\n".join(lines), encoding="utf-8")

          print(f"Generated {output} with {len(planned_posts)} planned post(s).")

          with open(Path.cwd() / "planned-posts-summary.md", "w", encoding="utf-8") as summary:
              summary.write("## Planned posts\n\n")
              if planned_posts:
                  summary.write("| Date | Title | File |\n")
                  summary.write("|---|---|---|\n")
                  for post in planned_posts:
                      summary.write(
                          f"| {post['date'].strftime('%d-%m-%Y')} | {post['title']} | `{post['file']}` |\n"
                      )
              else:
                  summary.write("No planned posts found.\n")

          with open("$GITHUB_STEP_SUMMARY", "a", encoding="utf-8") as github_summary:
              github_summary.write("## Planned posts\n\n")
              if planned_posts:
                  github_summary.write("| Date | Title | File |\n")
                  github_summary.write("|---|---|---|\n")
                  for post in planned_posts:
                      github_summary.write(
                          f"| {post['date'].strftime('%d-%m-%Y')} | {post['title']} | `{post['file']}` |\n"
                      )
              else:
                  github_summary.write("No planned posts found.\n")
          PY

      - name: Build site
        run: hugo --minify --gc

      - name: Sanity check build output
        run: test -f public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
